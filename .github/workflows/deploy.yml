name: Build & Deploy

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -DskipTests -q

      - name: Deploy to production
        uses: appleboy/scp-action@v0.1.7
        with:
          host: b.huxg.online
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          source: target/jkyErp.jar
          target: /opt/lims/
          strip_components: 1

      - name: Restart service
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: b.huxg.online
          username: root
          key: ${{ secrets.PROD_SSH_KEY }}
          script: |
            mv /opt/lims/jkyErp.jar /opt/lims/lims-service.jar
            systemctl restart lims
            sleep 5
            systemctl is-active lims && echo "Deploy OK" || echo "Deploy FAILED"