<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml" xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/thymeleaf-extras-springsecurity3">
<head>
    <title></title>
    <meta charset="utf-8">
    <script type="text/javascript">
        function Save() {
            document.getElementById("PageOfficeCtrl1").WebSave();
        }

        function SetFullScreen() {
            document.getElementById("PageOfficeCtrl1").FullScreen = !document.getElementById("PageOfficeCtrl1").FullScreen;
        }

        function Close() {
            window.external.close();
        }
    </script>
</head>
<body>
<form id="form1">
    <div style="font-size: 14px;">
        <label for="">
            检测人：
            <select multiple name="cars1" id="testSet"  th:value="testSet">
                <!--/*@thymesVar id="userInfoVos" type="11"*/-->

                <!--/*@thymesVar id="userId" type="22"*/-->
                <option th:each="e:${userInfoVos}" th:value="${e.departmentId}" th:text="${e.name}"></option>

            </select>
        </label>
        <label for="">
            记录人：
            <select multiple name="cars2" id="recordSet" th:value="recordSet">
                <!--/*@thymesVar id="userInfoVos" type="11"*/-->

                <!--/*@thymesVar id="userId" type="22"*/-->
                <option th:each="e:${userInfoVos}" th:value="${e.departmentId}" th:text="${e.name}"></option>

            </select>
        </label>
        <input id="items" name="items" type="hidden" th:value="${items}" style="display: none"/>

    </select>
    </div>
    <div style=" width:auto; height:700px;" th:utext="${pageoffice}"></div>
</form>
</body>
</html>
