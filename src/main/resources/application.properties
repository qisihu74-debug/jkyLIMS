# BANNER
spring.banner.charset=UTF-8
spring.banner.location=classpath:banner.txt 
spring.banner.image.location=classpath:banner.gif
spring.banner.image.width=76 
spring.banner.image.height=
spring.banner.image.margin=2 
spring.banner.image.invert=false 

#服务端口配置
http.port=8080
server.port=48888
#server.servlet.context-path=/lims
#开启https,配置跟证书对应
server.ssl.enabled=true
server.ssl.key-store=classpath:tomcat.keystore
# server.ssl.key-store-type=JKS
server.ssl.key-store-type=JKS
#密码
server.ssl.key-store-password=111111
#别名
server.ssl.key-alias=tomcat

#mybatis plus
#mapper文件扫描路径配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
#实体bean包扫描
mybatis-plus.type-aliases-package=com.lims.manage.demo.entity
#log4j2配置文件路径
logging.config=classpath:log4j2.xml
#sql输出日志级别
logging.level.com.lims.manage.demo.mapper = debug
spring.resources.static-locations=classpath:/templates/,classpath:/static/

#redis相关配置
spring.redis.host=192.168.2.35
spring.redis.port=6379
#spring.redis.password=
#redis超时时间
spring.redis.timeout=10000
#连接池最大连接数（使用负值表示没有限制） 默认 8
#spring.redis.lettuce.pool.max-active=16
#连接池中的最大空闲连接 默认 8
#spring.redis.lettuce.pool.max-idle=8
#连接池最大阻塞等待时间,单位毫秒（使用负值表示没有限制） 默认 -1
#spring.redis.lettuce.pool.max-wait=1000ms
#连接池默认最小链接数 0
#spring.redis.lettuce.pool.min-idle=0

#minio配置文件
minio.ip=http://192.168.2.35
minio.port=9000
minio.access-key=root
minio.secret-key=root_1234

