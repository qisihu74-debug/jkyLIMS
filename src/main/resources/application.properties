#mybatis plus
#mapper文件扫描路径配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
#实体bean包扫描
mybatis-plus.type-aliases-package=com.jifen.manage.demo.entity
#log4j2配置文件路径
logging.config=classpath:log4j2.xml
#sql输出日志级别
logging.level.com.jifen.manage.demo.mapper = debug
spring.resources.static-locations=classpath:/templates/,classpath:/static/

